<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Trykhana Timer</title>
<style>
  :root {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f5f5f5;
    background: #111;
  }
  body {
    margin: 0;
    padding: 8px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    background: #111;
  }
  h1 { font-size: 18px; margin: 0; }
  h2 { font-size: 15px; margin: 8px 0 4px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .version { color: #aaa; font-size: 11px; }
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin: 6px 0;
  }
  .tabBtn { background: #242424; }
  .tabBtn.active { background: #0b63ce; }
  .page { display: none; }
  .page.active { display: block; }

  .lapSummary {
    display: grid;
    grid-template-columns: 1fr 1fr 1.1fr;
    gap: 6px;
    margin: 6px 0;
    font-variant-numeric: tabular-nums;
  }
  .timeBox {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 7px 6px;
    min-width: 0;
  }
  .timeLabel {
    color: #aaa;
    font-size: 11px;
    line-height: 1.1;
  }
  .timeValue {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.15;
    margin-top: 2px;
    white-space: nowrap;
  }
  .timeBox.total .timeValue {
    font-size: 23px;
  }

  .videoBox {
    position: relative;
    width: 100%;
    max-height: 34vh;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  video {
    width: 100%;
    max-height: 34vh;
    object-fit: contain;
    display: block;
  }
  canvas.overlay {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .settingsPanel {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 6px;
    margin-top: 6px;
  }
  .controlPanel {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 6px;
    margin-top: 6px;
  }
  button, input, select {
    font-size: 14px;
    padding: 8px;
    border-radius: 9px;
    border: 1px solid #444;
  }
  button { color: #fff; background: #333; }
  button.primary { background: #0b63ce; }
  button.danger { background: #9b1c1c; }
  button.good { background: #146b2e; }
  label {
    font-size: 12px;
    color: #ddd;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  input[type="range"] {
    padding-left: 0;
    padding-right: 0;
  }
  .readout {
    margin-top: 6px;
    padding: 8px;
    background: #1c1c1c;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
  }
  .mainTime {
    font-size: 30px;
    line-height: 1.05;
    font-weight: 800;
  }
  .sub {
    color: #bbb;
    margin-top: 3px;
    line-height: 1.25;
    font-size: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  th, td {
    border-bottom: 1px solid #333;
    padding: 5px 3px;
    text-align: right;
    vertical-align: top;
  }
  th:first-child, td:first-child { text-align: left; }
  .note {
    color: #bbb;
    font-size: 12px;
    line-height: 1.4;
    margin-top: 6px;
  }
  .resultCard {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
  .resultHead {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: baseline;
  }
  .resultTime { font-size: 22px; font-weight: 700; }
  .muted { color: #aaa; font-size: 13px; }
  .smallGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 8px;
    color: #ccc;
    font-size: 13px;
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    background: #333;
    color: #ddd;
    font-size: 12px;
  }

  @media (max-width: 430px) {
    body { padding: 6px; padding-bottom: calc(6px + env(safe-area-inset-bottom)); }
    h1 { font-size: 17px; }
    .tabs button { padding: 7px; }
    .videoBox, video { max-height: 29vh; }
    .timeValue { font-size: 18px; }
    .timeBox.total .timeValue { font-size: 21px; }
    .mainTime { font-size: 26px; }
    .settingsPanel { grid-template-columns: 1fr 1fr; }
    button, input, select { font-size: 13px; padding: 7px; }
    label { font-size: 11px; }
  }

  @media (max-width: 380px) {
    .videoBox, video { max-height: 25vh; }
    .settingsPanel { grid-template-columns: 1fr; }
    .lapSummary { gap: 4px; }
    .timeBox { padding: 6px 4px; }
    .timeValue { font-size: 16px; }
    .timeBox.total .timeValue { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>Trykhana Timer</h1>
    <div class="version">Camera Prototype</div>
  </div>

  <div class="tabs">
    <button id="timerTab" class="tabBtn active">計測</button>
    <button id="resultsTab" class="tabBtn">計測結果</button>
  </div>

  <section id="timerPage" class="page active">
    <div class="lapSummary">
      <div class="timeBox">
        <div class="timeLabel">1 Lap</div>
        <div id="lap1Time" class="timeValue">--.---</div>
      </div>
      <div class="timeBox">
        <div class="timeLabel">2 Lap</div>
        <div id="lap2Time" class="timeValue">--.---</div>
      </div>
      <div class="timeBox total">
        <div class="timeLabel">Total</div>
        <div id="totalTime" class="timeValue">00.000</div>
      </div>
    </div>

    <div class="videoBox">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay" class="overlay"></canvas>
    </div>

    <div class="readout">
      <div class="mainTime" id="mainTime">00.000</div>
      <div class="sub" id="status">未開始</div>
      <div class="sub">変化量: <span id="motion">0</span></div>
    </div>

    <div class="settingsPanel">
      <label>検出ライン方向
        <select id="lineDirection">
          <option value="vertical" selected>縦ライン：左右に横切る</option>
          <option value="horizontal">横ライン：上下に横切る</option>
        </select>
      </label>
      <label>検出ライン位置
        <input id="linePos" type="range" min="5" max="95" value="50">
      </label>
      <label>検出窓の幅/高さ
        <input id="bandSize" type="range" min="2" max="30" value="10">
      </label>
      <label>検出感度
        <input id="threshold" type="range" min="5" max="80" value="24">
      </label>
      <label>必要ラップ数
        <input id="targetLaps" type="number" value="2" min="1" max="10" step="1">
      </label>
      <label>再検出禁止 秒
        <input id="cooldownSec" type="number" value="0.9" min="0.1" step="0.1">
      </label>
      <label>次走待機 秒
        <input id="autoRearmDelaySec" type="number" value="2.5" min="0.5" step="0.1">
      </label>
      <label>先頭車のみ判定
        <select id="leadOnly">
          <option value="yes" selected>ON</option>
          <option value="no">OFF</option>
        </select>
      </label>
    </div>

    <div class="controlPanel">
      <button id="startCam" class="primary">カメラ開始</button>
      <button id="arm" class="primary">計測待機</button>
      <button id="reset" class="danger">手動リセット</button>
    </div>

    <table>
      <thead>
        <tr><th>通過</th><th>時刻</th><th>区間</th></tr>
      </thead>
      <tbody id="laps"></tbody>
    </table>
  </section>

  <section id="resultsPage" class="page">
    <div class="settingsPanel">
      <button id="refreshResults" class="good">結果を更新</button>
      <button id="exportAllCsv">CSV出力</button>
      <button id="clearResults" class="danger">全結果削除</button>
    </div>

    <h2>計測結果リスト</h2>
    <div id="resultsList"></div>
  </section>
</div>

<script>
(() => {
  const STORAGE_KEY = "trykhanaTimerResults.v1";

  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");
  const octx = overlay.getContext("2d");

  const timerTab = document.getElementById("timerTab");
  const resultsTab = document.getElementById("resultsTab");
  const timerPage = document.getElementById("timerPage");
  const resultsPage = document.getElementById("resultsPage");

  const startCamBtn = document.getElementById("startCam");
  const armBtn = document.getElementById("arm");
  const resetBtn = document.getElementById("reset");

  const refreshResultsBtn = document.getElementById("refreshResults");
  const exportAllCsvBtn = document.getElementById("exportAllCsv");
  const clearResultsBtn = document.getElementById("clearResults");

  const lineDirectionInput = document.getElementById("lineDirection");
  const linePosInput = document.getElementById("linePos");
  const bandSizeInput = document.getElementById("bandSize");
  const thresholdInput = document.getElementById("threshold");
  const cooldownSecInput = document.getElementById("cooldownSec");
  const autoRearmDelaySecInput = document.getElementById("autoRearmDelaySec");
  const targetLapsInput = document.getElementById("targetLaps");
  const leadOnlyInput = document.getElementById("leadOnly");

  const mainTime = document.getElementById("mainTime");
  const lap1Time = document.getElementById("lap1Time");
  const lap2Time = document.getElementById("lap2Time");
  const totalTime = document.getElementById("totalTime");
  const status = document.getElementById("status");
  const motionSpan = document.getElementById("motion");
  const lapsBody = document.getElementById("laps");
  const resultsList = document.getElementById("resultsList");

  const work = document.createElement("canvas");
  const wctx = work.getContext("2d", { willReadFrequently: true });

  let armed = false;
  let running = false;
  let finished = false;
  let startTs = 0;
  let startWallTime = null;
  let lastDetectTs = -Infinity;
  let prevData = null;
  let passTimes = [];
  let loopStarted = false;
  let autoRearmTimer = null;

  function fmt(sec) {
    if (!isFinite(sec)) return "00.000";
    return sec.toFixed(3).padStart(6, "0");
  }

  function blankFmt(sec) {
    return Number.isFinite(sec) ? fmt(sec) : "--.---";
  }

  function fmtDateTime(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function switchPage(page) {
    const isTimer = page === "timer";
    timerTab.classList.toggle("active", isTimer);
    resultsTab.classList.toggle("active", !isTimer);
    timerPage.classList.toggle("active", isTimer);
    resultsPage.classList.toggle("active", !isTimer);
    if (!isTimer) renderResults();
  }

  function loadResults() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
    catch { return []; }
  }

  function saveResults(results) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
  }

  function addResult(result) {
    const results = loadResults();
    results.unshift(result);
    saveResults(results.slice(0, 300));
    renderResults();
  }

  function updateSummary() {
    const lap1 = passTimes.length > 1 ? passTimes[1] - passTimes[0] : NaN;
    const lap2 = passTimes.length > 2 ? passTimes[2] - passTimes[1] : NaN;
    const total = passTimes.length > 0 ? passTimes[passTimes.length - 1] : (running ? (performance.now() - startTs) / 1000 : 0);
    lap1Time.textContent = blankFmt(lap1);
    lap2Time.textContent = blankFmt(lap2);
    totalTime.textContent = fmt(total);
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60, min: 30 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      status.textContent = "カメラ起動。ラインを合わせて計測待機してください";
      if (!loopStarted) {
        loopStarted = true;
        loop();
      }
    } catch (e) {
      status.textContent = "カメラを開始できません: " + e.message;
    }
  }

  function clearAutoRearm() {
    if (autoRearmTimer) {
      clearTimeout(autoRearmTimer);
      autoRearmTimer = null;
    }
  }

  function resetManual() {
    clearAutoRearm();
    armed = false;
    running = false;
    finished = false;
    startTs = 0;
    startWallTime = null;
    lastDetectTs = -Infinity;
    prevData = null;
    passTimes = [];
    mainTime.textContent = "00.000";
    status.textContent = "手動リセット済み";
    lapsBody.innerHTML = "";
    armBtn.textContent = "計測待機";
    updateSummary();
  }

  function prepareNextRun(message = "次の走行を待機中") {
    clearAutoRearm();
    armed = true;
    running = false;
    finished = false;
    startTs = 0;
    startWallTime = null;
    lastDetectTs = performance.now();
    prevData = null;
    passTimes = [];
    mainTime.textContent = "00.000";
    status.textContent = message;
    lapsBody.innerHTML = "";
    armBtn.textContent = "待機中";
    updateSummary();
  }

  function arm() {
    if (!video.srcObject) {
      status.textContent = "先にカメラを開始してください";
      return;
    }
    prepareNextRun("最初の通過でスタートします");
  }

  function addPass(ts) {
    const targetLaps = Math.max(1, Number(targetLapsInput.value || 2));
    const nowSec = (ts - startTs) / 1000;

    if (!running) {
      running = true;
      finished = false;
      startTs = ts;
      startWallTime = new Date();
      passTimes.push(0);
      status.textContent = "スタート検出";
      renderRows();
      updateSummary();
      return;
    }

    passTimes.push(nowSec);
    const completedLaps = passTimes.length - 1;

    if (completedLaps >= targetLaps) {
      finishRun(nowSec, targetLaps);
    } else {
      status.textContent = `Lap ${completedLaps}: ${fmt(nowSec - passTimes[passTimes.length - 2])} 秒`;
      renderRows();
      updateSummary();
    }
  }

  function finishRun(totalSec, targetLaps) {
    const finishWallTime = new Date();
    const splits = [];
    for (let i = 1; i < passTimes.length; i++) {
      splits.push(Number((passTimes[i] - passTimes[i - 1]).toFixed(3)));
    }

    const result = {
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
      startTime: startWallTime ? startWallTime.toISOString() : null,
      finishTime: finishWallTime.toISOString(),
      totalSec: Number(totalSec.toFixed(3)),
      targetLaps,
      splits,
      passTimes: passTimes.map(v => Number(v.toFixed(3))),
      settings: {
        lineDirection: lineDirectionInput.value,
        linePos: Number(linePosInput.value),
        bandSize: Number(bandSizeInput.value),
        threshold: Number(thresholdInput.value),
        cooldownSec: Number(cooldownSecInput.value)
      }
    };

    addResult(result);

    finished = true;
    running = false;
    armed = false;
    status.textContent = `${targetLaps}ラップ完了 / 合計 ${fmt(totalSec)} 秒 / ゴール ${fmtDateTime(result.finishTime)}`;
    renderRows();
    updateSummary();

    const delay = Math.max(500, Number(autoRearmDelaySecInput.value || 2.5) * 1000);
    autoRearmTimer = setTimeout(() => {
      if (video.srcObject) prepareNextRun("自動で次の走行を待機中");
    }, delay);
  }

  function renderRows() {
    lapsBody.innerHTML = "";
    passTimes.forEach((t, i) => {
      const tr = document.createElement("tr");
      const split = i === 0 ? "-" : fmt(t - passTimes[i - 1]);
      tr.innerHTML = `<td>${i === 0 ? "START" : "LAP " + i}</td><td>${fmt(t)}</td><td>${split}</td>`;
      lapsBody.appendChild(tr);
    });
  }

  function allResultsCsv() {
    const rows = [["finish_time","start_time","total_sec","lap1_sec","lap2_sec","line_direction","line_pos","band_size","threshold","cooldown_sec"]];
    loadResults().forEach(r => {
      rows.push([
        r.finishTime || "",
        r.startTime || "",
        r.totalSec ?? "",
        r.splits?.[0] ?? "",
        r.splits?.[1] ?? "",
        r.settings?.lineDirection ?? "",
        r.settings?.linePos ?? "",
        r.settings?.bandSize ?? "",
        r.settings?.threshold ?? "",
        r.settings?.cooldownSec ?? ""
      ]);
    });
    return rows.map(row => row.map(v => `"${String(v).replaceAll('"','""')}"`).join(",")).join("\n");
  }

  function downloadText(filename, text) {
    const blob = new Blob([text], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function renderResults() {
    const results = loadResults();
    resultsList.innerHTML = "";

    if (results.length === 0) {
      resultsList.innerHTML = `<div class="note">まだ計測結果がありません。</div>`;
      return;
    }

    const best = Math.min(...results.map(x => Number(x.totalSec)).filter(Number.isFinite));

    results.forEach((r, idx) => {
      const div = document.createElement("div");
      div.className = "resultCard";
      const isBest = Number(r.totalSec) === best;
      const splitsText = (r.splits || []).map((s, i) => `Lap ${i+1}: ${fmt(s)}`).join(" / ");

      div.innerHTML = `
        <div class="resultHead">
          <div>
            <span class="pill">#${results.length - idx}</span>
            ${isBest ? '<span class="pill">BEST</span>' : ''}
            <div class="muted">ゴール ${r.finishTime ? fmtDateTime(r.finishTime) : "-"}</div>
          </div>
          <div class="resultTime">${fmt(Number(r.totalSec))}</div>
        </div>
        <div class="smallGrid">
          <div>スタート：${r.startTime ? fmtDateTime(r.startTime) : "-"}</div>
          <div>検出：${r.settings?.lineDirection === "vertical" ? "縦ライン" : "横ライン"}</div>
          <div>感度：${r.settings?.threshold ?? "-"}</div>
        </div>
        <div class="sub">${splitsText}</div>
      `;
      resultsList.appendChild(div);
    });
  }

  function clearResults() {
    if (!confirm("計測結果をすべて削除しますか？")) return;
    saveResults([]);
    renderResults();
  }

  function getDetectionRect(vw, vh) {
    const dir = lineDirectionInput.value;
    const posPct = Number(linePosInput.value) / 100;
    const bandPct = Number(bandSizeInput.value) / 100;

    if (dir === "vertical") {
      const bandW = Math.max(4, Math.floor(vw * bandPct));
      const x = Math.max(0, Math.min(vw - bandW, Math.floor(vw * posPct - bandW / 2)));
      return { x, y: 0, w: bandW, h: vh, dir };
    } else {
      const bandH = Math.max(4, Math.floor(vh * bandPct));
      const y = Math.max(0, Math.min(vh - bandH, Math.floor(vh * posPct - bandH / 2)));
      return { x: 0, y, w: vw, h: bandH, dir };
    }
  }

  function drawOverlay(motion) {
    overlay.width = video.clientWidth * devicePixelRatio;
    overlay.height = video.clientHeight * devicePixelRatio;
    octx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    octx.clearRect(0, 0, overlay.clientWidth, overlay.clientHeight);

    const dir = lineDirectionInput.value;
    const posPct = Number(linePosInput.value) / 100;
    const bandPct = Number(bandSizeInput.value) / 100;
    const hot = motion > Number(thresholdInput.value);

    octx.fillStyle = "rgba(255,255,255,0.10)";
    octx.strokeStyle = hot ? "#ff4040" : "#00e0ff";
    octx.lineWidth = 3;

    if (dir === "vertical") {
      const x = overlay.clientWidth * posPct;
      const w = overlay.clientWidth * bandPct;
      octx.fillRect(x - w/2, 0, w, overlay.clientHeight);
      octx.beginPath();
      octx.moveTo(x, 0);
      octx.lineTo(x, overlay.clientHeight);
      octx.stroke();
    } else {
      const y = overlay.clientHeight * posPct;
      const h = overlay.clientHeight * bandPct;
      octx.fillRect(0, y - h/2, overlay.clientWidth, h);
      octx.beginPath();
      octx.moveTo(0, y);
      octx.lineTo(overlay.clientWidth, y);
      octx.stroke();
    }
  }

  function loop(ts = performance.now()) {
    requestAnimationFrame(loop);
    if (!video.videoWidth || !video.videoHeight) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    work.width = vw;
    work.height = vh;

    wctx.drawImage(video, 0, 0, vw, vh);
    const r = getDetectionRect(vw, vh);
    const img = wctx.getImageData(r.x, r.y, r.w, r.h);
    const data = img.data;

    let motion = 0;
    if (prevData && prevData.length === data.length) {
      let sum = 0;
      let n = 0;
      for (let i = 0; i < data.length; i += 16) {
        const lum = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        const plum = prevData[i] * 0.299 + prevData[i+1] * 0.587 + prevData[i+2] * 0.114;
        sum += Math.abs(lum - plum);
        n++;
      }
      motion = sum / Math.max(1, n);
    }
    prevData = new Uint8ClampedArray(data);

    motionSpan.textContent = motion.toFixed(1);
    drawOverlay(motion);

    const threshold = Number(thresholdInput.value);
    const baseCooldown = Number(cooldownSecInput.value || 0.9) * 1000;
    const cooldown = leadOnlyInput.value === "yes" ? baseCooldown : Math.min(baseCooldown, 500);
    const canDetect = ts - lastDetectTs > cooldown;

    if (armed && !finished && canDetect && motion > threshold) {
      lastDetectTs = ts;
      addPass(ts);
    }

    if (running && !finished) {
      const elapsed = (ts - startTs) / 1000;
      mainTime.textContent = fmt(elapsed);
      totalTime.textContent = fmt(elapsed);
    }
  }

  startCamBtn.addEventListener("click", startCamera);
  armBtn.addEventListener("click", arm);
  resetBtn.addEventListener("click", resetManual);

  timerTab.addEventListener("click", () => switchPage("timer"));
  resultsTab.addEventListener("click", () => switchPage("results"));
  refreshResultsBtn.addEventListener("click", renderResults);
  exportAllCsvBtn.addEventListener("click", () => downloadText("trykhana-results.csv", allResultsCsv()));
  clearResultsBtn.addEventListener("click", clearResults);

  lineDirectionInput.addEventListener("change", () => { prevData = null; });
  linePosInput.addEventListener("input", () => { prevData = null; });
  bandSizeInput.addEventListener("input", () => { prevData = null; });

  renderResults();
  updateSummary();
})();
</script>
</body>
</html>
