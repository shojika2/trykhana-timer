<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Trykhana Timer</title>
<style>
  :root {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f5f5f5;
    background: #111;
  }
  body {
    margin: 0;
    padding: 12px;
    background: #111;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
  }
  .videoBox {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
  }
  video, canvas.overlay {
    width: 100%;
    display: block;
  }
  canvas.overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .panel {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 8px;
    margin-top: 10px;
  }
  button, input, select {
    font-size: 16px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #444;
  }
  button {
    color: #fff;
    background: #333;
  }
  button.primary {
    background: #0b63ce;
  }
  button.danger {
    background: #9b1c1c;
  }
  label {
    font-size: 13px;
    color: #ddd;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .readout {
    margin-top: 10px;
    padding: 12px;
    background: #1c1c1c;
    border-radius: 12px;
    font-variant-numeric: tabular-nums;
  }
  .big {
    font-size: 40px;
    line-height: 1.1;
    font-weight: 700;
  }
  .sub {
    color: #bbb;
    margin-top: 4px;
    line-height: 1.4;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    border-bottom: 1px solid #333;
    padding: 8px 4px;
    text-align: right;
  }
  th:first-child, td:first-child {
    text-align: left;
  }
  .note {
    color: #bbb;
    font-size: 13px;
    line-height: 1.55;
    margin-top: 10px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .version {
    color: #aaa;
    font-size: 12px;
  }
  @media (max-width: 520px) {
    .panel {
      grid-template-columns: 1fr;
    }
    .big {
      font-size: 34px;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>Trykhana Timer</h1>
    <div class="version">Camera Prototype</div>
  </div>

  <div class="videoBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay" class="overlay"></canvas>
  </div>

  <div class="panel">
    <button id="startCam" class="primary">カメラ開始</button>
    <button id="arm" class="primary">計測待機</button>
    <button id="reset" class="danger">リセット</button>
    <button id="exportCsv">CSV出力</button>

    <label>検出ライン位置
      <input id="lineY" type="range" min="5" max="95" value="50">
    </label>
    <label>検出窓の高さ
      <input id="bandH" type="range" min="2" max="30" value="10">
    </label>
    <label>検出感度
      <input id="threshold" type="range" min="5" max="80" value="24">
    </label>
    <label>再検出禁止時間 ms
      <input id="cooldown" type="number" value="900" min="100" step="50">
    </label>
    <label>必要ラップ数
      <input id="targetLaps" type="number" value="2" min="1" max="10">
    </label>
    <label>先頭車両のみ判定
      <select id="leadOnly">
        <option value="yes" selected>ON</option>
        <option value="no">OFF</option>
      </select>
    </label>
  </div>

  <div class="readout">
    <div class="big" id="mainTime">00.000</div>
    <div class="sub" id="status">未開始</div>
    <div class="sub">変化量: <span id="motion">0</span></div>
  </div>

  <table>
    <thead>
      <tr><th>通過</th><th>時刻</th><th>区間/ラップ</th></tr>
    </thead>
    <tbody id="laps"></tbody>
  </table>

  <div class="note">
    使い方：スマホを三脚で固定し、スタート/ゴールラインを画面の横線に合わせます。
    「カメラ開始」→「計測待機」。最初の通過をスタート、以後の通過をラップとして記録します。
    複数台が走る場合は、先頭車両通過後の再検出禁止時間を長めにして、後続車を無視します。
    本番精度を出すには逆光、影、観客、手ブレを避けてください。
  </div>
</div>

<script>
(() => {
  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");
  const octx = overlay.getContext("2d");

  const startCamBtn = document.getElementById("startCam");
  const armBtn = document.getElementById("arm");
  const resetBtn = document.getElementById("reset");
  const exportBtn = document.getElementById("exportCsv");

  const lineYInput = document.getElementById("lineY");
  const bandHInput = document.getElementById("bandH");
  const thresholdInput = document.getElementById("threshold");
  const cooldownInput = document.getElementById("cooldown");
  const targetLapsInput = document.getElementById("targetLaps");
  const leadOnlyInput = document.getElementById("leadOnly");

  const mainTime = document.getElementById("mainTime");
  const status = document.getElementById("status");
  const motionSpan = document.getElementById("motion");
  const lapsBody = document.getElementById("laps");

  const work = document.createElement("canvas");
  const wctx = work.getContext("2d", { willReadFrequently: true });

  let armed = false;
  let running = false;
  let finished = false;
  let startTs = 0;
  let lastDetectTs = -Infinity;
  let prevData = null;
  let passTimes = [];
  let rafId = null;

  function fmt(sec) {
    if (!isFinite(sec)) return "00.000";
    return sec.toFixed(3).padStart(6, "0");
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60, min: 30 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      status.textContent = "カメラ起動。ラインを合わせて計測待機してください";
      loop();
    } catch (e) {
      status.textContent = "カメラを開始できません: " + e.message;
    }
  }

  function reset() {
    armed = false;
    running = false;
    finished = false;
    startTs = 0;
    lastDetectTs = -Infinity;
    prevData = null;
    passTimes = [];
    mainTime.textContent = "00.000";
    status.textContent = "リセット済み";
    lapsBody.innerHTML = "";
    armBtn.textContent = "計測待機";
  }

  function arm() {
    if (!video.srcObject) {
      status.textContent = "先にカメラを開始してください";
      return;
    }
    reset();
    armed = true;
    armBtn.textContent = "待機中...";
    status.textContent = "最初の通過でスタートします";
  }

  function addPass(ts) {
    const targetLaps = Number(targetLapsInput.value || 2);
    const nowSec = (ts - startTs) / 1000;

    if (!running) {
      running = true;
      startTs = ts;
      passTimes.push(0);
      status.textContent = "スタート検出";
      renderRows();
      return;
    }

    passTimes.push(nowSec);
    const completedLaps = passTimes.length - 1;

    if (completedLaps >= targetLaps) {
      finished = true;
      running = false;
      armed = false;
      status.textContent = `${targetLaps}ラップ完了 / 合計 ${fmt(nowSec)} 秒`;
      armBtn.textContent = "計測待機";
    } else {
      status.textContent = `Lap ${completedLaps}: ${fmt(nowSec - passTimes[passTimes.length - 2])} 秒`;
    }
    renderRows();
  }

  function renderRows() {
    lapsBody.innerHTML = "";
    passTimes.forEach((t, i) => {
      const tr = document.createElement("tr");
      const split = i === 0 ? "-" : fmt(t - passTimes[i - 1]);
      tr.innerHTML = `<td>${i === 0 ? "START" : "LAP " + i}</td><td>${fmt(t)}</td><td>${split}</td>`;
      lapsBody.appendChild(tr);
    });
  }

  function exportCsv() {
    const rows = [["pass","time_sec","split_sec"]];
    passTimes.forEach((t, i) => rows.push([
      i === 0 ? "START" : "LAP " + i,
      t.toFixed(3),
      i === 0 ? "" : (t - passTimes[i - 1]).toFixed(3)
    ]));
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "trykhana-timer.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function drawOverlay(motion) {
    overlay.width = video.clientWidth * devicePixelRatio;
    overlay.height = video.clientHeight * devicePixelRatio;
    octx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    octx.clearRect(0, 0, overlay.clientWidth, overlay.clientHeight);

    const yPct = Number(lineYInput.value) / 100;
    const bandPct = Number(bandHInput.value) / 100;
    const y = overlay.clientHeight * yPct;
    const h = overlay.clientHeight * bandPct;

    octx.fillStyle = "rgba(255,255,255,0.10)";
    octx.fillRect(0, y - h/2, overlay.clientWidth, h);
    octx.strokeStyle = motion > Number(thresholdInput.value) ? "#ff4040" : "#00e0ff";
    octx.lineWidth = 3;
    octx.beginPath();
    octx.moveTo(0, y);
    octx.lineTo(overlay.clientWidth, y);
    octx.stroke();
  }

  function loop(ts = performance.now()) {
    rafId = requestAnimationFrame(loop);

    if (!video.videoWidth || !video.videoHeight) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    work.width = vw;
    work.height = vh;

    const lineYPct = Number(lineYInput.value) / 100;
    const bandPct = Number(bandHInput.value) / 100;
    const bandH = Math.max(4, Math.floor(vh * bandPct));
    const y = Math.max(0, Math.min(vh - bandH, Math.floor(vh * lineYPct - bandH / 2)));

    wctx.drawImage(video, 0, 0, vw, vh);
    const img = wctx.getImageData(0, y, vw, bandH);
    const data = img.data;

    let motion = 0;
    if (prevData && prevData.length === data.length) {
      let sum = 0;
      let n = 0;
      for (let i = 0; i < data.length; i += 16) {
        const lum = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        const plum = prevData[i] * 0.299 + prevData[i+1] * 0.587 + prevData[i+2] * 0.114;
        sum += Math.abs(lum - plum);
        n++;
      }
      motion = sum / Math.max(1, n);
    }
    prevData = new Uint8ClampedArray(data);

    motionSpan.textContent = motion.toFixed(1);
    drawOverlay(motion);

    const threshold = Number(thresholdInput.value);
    const cooldown = Number(cooldownInput.value);
    const canDetect = ts - lastDetectTs > cooldown;

    if (armed && !finished && canDetect && motion > threshold) {
      lastDetectTs = ts;
      addPass(ts);
    }

    if (running && !finished) {
      mainTime.textContent = fmt((ts - startTs) / 1000);
    }
  }

  startCamBtn.addEventListener("click", startCamera);
  armBtn.addEventListener("click", arm);
  resetBtn.addEventListener("click", reset);
  exportBtn.addEventListener("click", exportCsv);
})();
</script>
</body>
</html>
